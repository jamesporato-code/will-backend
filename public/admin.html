<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will — Admin Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0e1117; color: #e6edf3; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #30363d; }
h1 { font-size: 24px; font-weight: 700; }
.token-input { display: flex; gap: 8px; align-items: center; }
.token-input input { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 320px; font-family: monospace; }
.token-input button { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
.token-input button:hover { background: #2ea043; }
.tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #30363d; }
.tab { padding: 10px 20px; background: none; color: #8b949e; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s; }
.tab:hover { color: #e6edf3; }
.tab.active { color: #e6edf3; border-bottom-color: #2f81f7; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
.card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; color: #e6edf3; }
.card .sub { font-size: 12px; color: #8b949e; margin-top: 4px; }
.card.alert { border-color: #f85149; background: #2a1213; }
.card.warn { border-color: #d29922; background: #2b2510; }
.card.success { border-color: #238636; }
.section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.section h2 { font-size: 16px; margin-bottom: 16px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; border-bottom: 1px solid #30363d; }
td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #1c2128; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.active { background: #1f6feb33; color: #58a6ff; }
.badge.soon { background: #d2992233; color: #e3b341; }
.badge.tomorrow { background: #f85a4933; color: #ff7b72; }
.badge.expired { background: #8b949e33; color: #8b949e; }
.badge.trial { background: #238636; color: white; }
.badge.pro { background: #a371f7; color: white; }
.badge.cancelled { background: #da3633; color: white; }
.loading { text-align: center; padding: 40px; color: #8b949e; }
.error { padding: 12px; background: #2a1213; border: 1px solid #f85149; border-radius: 6px; color: #ff7b72; margin-bottom: 16px; }
.refresh-btn { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.refresh-btn:hover { background: #30363d; }
.small { font-size: 11px; color: #8b949e; }
.mono { font-family: monospace; font-size: 12px; color: #7d8590; }
.progress-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; margin-top: 6px; }
.progress-bar .fill { height: 100%; background: #2f81f7; transition: width .3s; }
.progress-bar .fill.warn { background: #d29922; }
.progress-bar .fill.alert { background: #f85149; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🤖 Will Admin</h1>
    <div class="token-input">
      <input type="password" id="token" placeholder="x-admin-token" />
      <button onclick="saveTokenAndRefresh()">Charger</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">📊 Vue globale</button>
    <button class="tab" onclick="switchTab('users')">👥 Users</button>
    <button class="tab" onclick="switchTab('trials')">⏳ Trials</button>
    <button class="tab" onclick="switchTab('payments')">💳 Paiements</button>
    <button class="tab" onclick="switchTab('revenue')">💰 Revenus</button>
  </div>

  <div id="error-box"></div>
  <div id="content"><div class="loading">Entre ton token admin et clique "Charger" ☝️</div></div>
</div>

<script>
let TOKEN = localStorage.getItem('admin_token') || '';
document.getElementById('token').value = TOKEN;
let currentTab = 'overview';

function saveTokenAndRefresh() {
  TOKEN = document.getElementById('token').value.trim();
  localStorage.setItem('admin_token', TOKEN);
  loadTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  loadTab(tab);
}

async function api(path) {
  const r = await fetch(path, { headers: { 'x-admin-token': TOKEN } });
  if (!r.ok) {
    const t = await r.text();
    throw new Error('HTTP ' + r.status + ' — ' + t.substring(0, 200));
  }
  return r.json();
}

function showError(msg) {
  document.getElementById('error-box').innerHTML = '<div class="error">❌ ' + msg + '</div>';
}
function clearError() {
  document.getElementById('error-box').innerHTML = '';
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: '2-digit' });
}
function fmtDateTime(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function planBadge(plan) {
  return '<span class="badge ' + plan + '">' + (plan || '-') + '</span>';
}

async function loadTab(tab) {
  if (!TOKEN) { showError('Token manquant'); return; }
  clearError();
  document.getElementById('content').innerHTML = '<div class="loading">Chargement...</div>';
  try {
    if (tab === 'overview') await loadOverview();
    else if (tab === 'users') await loadUsers();
    else if (tab === 'trials') await loadTrials();
    else if (tab === 'payments') await loadPayments();
    else if (tab === 'revenue') await loadRevenue();
  } catch (e) {
    showError(e.message);
    document.getElementById('content').innerHTML = '';
  }
}

async function loadOverview() {
  const [stats, trials, issues] = await Promise.all([
    api('/api/admin/stats'),
    api('/api/admin/trials'),
    api('/api/admin/payment-issues'),
  ]);
  const ov = stats.overview;
  const html = `
    <div class="cards">
      <div class="card"><div class="label">Users total</div><div class="value">${ov.totalUsers}</div><div class="sub">${ov.newUsersWeek} cette semaine</div></div>
      <div class="card success"><div class="label">Onboardés</div><div class="value">${ov.onboardedUsers}</div><div class="sub">${Math.round(ov.onboardedUsers / Math.max(ov.totalUsers,1) * 100)}% de conversion</div></div>
      <div class="card"><div class="label">Payants</div><div class="value">${ov.paidUsers}</div><div class="sub">Taux : ${ov.conversionRate}%</div></div>
      <div class="card ${trials.summary.expires_tomorrow > 0 ? 'warn' : ''}"><div class="label">Trials actifs</div><div class="value">${trials.summary.active + trials.summary.expires_soon + trials.summary.expires_tomorrow}</div><div class="sub">${trials.summary.expires_tomorrow} expirent demain ⚠️</div></div>
      <div class="card ${issues.total > 0 ? 'alert' : ''}"><div class="label">Paiements KO</div><div class="value">${issues.total}</div><div class="sub">Grace / échec / annulé</div></div>
      <div class="card"><div class="label">Messages today</div><div class="value">${ov.messagesToday}</div><div class="sub">${ov.messagesWeek} cette semaine</div></div>
    </div>
    <div class="section"><h2>📈 Répartition par plan</h2>
      <table><thead><tr><th>Plan</th><th>Nombre</th></tr></thead><tbody>
        ${stats.planStats.map(p => `<tr><td>${planBadge(p.plan)}</td><td>${p.count}</td></tr>`).join('')}
      </tbody></table>
    </div>
    <div class="section"><h2>📊 Signups 30 derniers jours</h2>
      ${stats.signupsByDay.slice(-15).map(d => `
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
          <span class="mono" style="width: 80px;">${fmtDate(d.date)}</span>
          <div style="flex:1; background: #21262d; border-radius: 4px; height: 20px; position: relative; overflow: hidden;">
            <div style="width: ${Math.min(d.count * 10, 100)}%; height: 100%; background: #2f81f7;"></div>
          </div>
          <span class="mono" style="width: 30px; text-align: right;">${d.count}</span>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

async function loadUsers() {
  const data = await api('/api/admin/users?limit=100');
  const html = `
    <div class="section">
      <h2>👥 Tous les users (${data.total})</h2>
      <table><thead><tr>
        <th>ID</th><th>Nom</th><th>WhatsApp</th><th>Plan</th><th>Niveau</th><th>Secteur</th><th>Msg</th><th>Créé</th><th>Dernière activité</th>
      </tr></thead><tbody>
        ${data.users.map(u => `<tr>
          <td class="mono">${u.id}</td>
          <td>${u.display_name || '-'}</td>
          <td class="mono">${u.whatsapp_id}</td>
          <td>${planBadge(u.plan)}</td>
          <td>${u.level || '-'}</td>
          <td>${u.job || '-'}</td>
          <td>${u.message_count || 0}</td>
          <td class="small">${fmtDate(u.created_at)}</td>
          <td class="small">${fmtDateTime(u.last_message_at)}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

async function loadTrials() {
  const data = await api('/api/admin/trials');
  const statusBadge = (s) => {
    const labels = { active: 'Actif', expires_soon: 'Expire bientôt', expires_tomorrow: 'Demain ⚠️', expired: 'Expiré' };
    return `<span class="badge ${s}">${labels[s] || s}</span>`;
  };
  const html = `
    <div class="cards">
      <div class="card"><div class="label">Actifs</div><div class="value">${data.summary.active}</div></div>
      <div class="card warn"><div class="label">Expire dans ≤3j</div><div class="value">${data.summary.expires_soon}</div></div>
      <div class="card alert"><div class="label">Expire demain</div><div class="value">${data.summary.expires_tomorrow}</div></div>
      <div class="card"><div class="label">Expirés</div><div class="value">${data.summary.expired}</div></div>
    </div>
    <div class="section">
      <h2>⏳ Tous les trials (${data.total})</h2>
      <table><thead><tr>
        <th>ID</th><th>Nom</th><th>WhatsApp</th><th>Créé</th><th>Jours restants</th><th>Status</th><th>Rappel J-1 envoyé</th><th>Msg</th>
      </tr></thead><tbody>
        ${data.trials.map(t => `<tr>
          <td class="mono">${t.id}</td>
          <td>${t.display_name || '-'}</td>
          <td class="mono">${t.whatsapp_id}</td>
          <td class="small">${fmtDate(t.created_at)}</td>
          <td>${t.days_remaining > 0 ? t.days_remaining + 'j' : '<span style="color:#f85149">' + t.days_remaining + 'j</span>'}</td>
          <td>${statusBadge(t.status)}</td>
          <td>${t.trial_reminder_sent ? '✅' : '—'}</td>
          <td>${t.message_count || 0}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

async function loadPayments() {
  const data = await api('/api/admin/payment-issues');
  const statusBadge = (s) => {
    const labels = { in_grace_period: 'Grace period', grace_expired: 'Grace expiré', payment_failed: 'Échec paiement', ok: 'OK' };
    const cls = { in_grace_period: 'warn', grace_expired: 'expired', payment_failed: 'tomorrow', ok: 'active' };
    return `<span class="badge ${cls[s] || 'active'}">${labels[s] || s}</span>`;
  };
  const html = `
    <div class="section">
      <h2>💳 Paiements en échec / annulations (${data.total})</h2>
      ${data.total === 0 ? '<p style="color:#8b949e">Aucun souci 🎉</p>' : ''}
      <table><thead><tr>
        <th>ID</th><th>Nom</th><th>WhatsApp</th><th>Plan</th><th>Payment failed</th><th>Grace jusqu'à</th><th>Status</th><th>Stripe ID</th>
      </tr></thead><tbody>
        ${data.users.map(u => `<tr>
          <td class="mono">${u.id}</td>
          <td>${u.display_name || '-'}</td>
          <td class="mono">${u.whatsapp_id}</td>
          <td>${planBadge(u.plan)}</td>
          <td class="small">${fmtDateTime(u.payment_failed_at)}</td>
          <td class="small">${fmtDateTime(u.payment_grace_until)}</td>
          <td>${statusBadge(u.status)}</td>
          <td class="mono" style="font-size:10px;">${u.stripe_customer_id || '-'}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

async function loadRevenue() {
  const data = await api('/api/admin/revenue');
  const html = `
    <div class="cards">
      <div class="card success"><div class="label">MRR</div><div class="value">${data.mrr.toFixed(0)}€</div><div class="sub">${data.activeSubscriptions} abos actifs</div></div>
      <div class="card"><div class="label">Revenus 30j</div><div class="value">${data.totalRevenue30d.toFixed(0)}€</div></div>
      <div class="card ${data.churnRate > 5 ? 'alert' : ''}"><div class="label">Churn</div><div class="value">${data.churnRate}%</div><div class="sub">${data.cancelledCount} annulés</div></div>
    </div>
    <div class="section">
      <h2>💰 Abonnements actifs</h2>
      <table><thead><tr>
        <th>Customer</th><th>Email</th><th>Plan</th><th>Montant</th><th>Fin période</th><th>Créé</th>
      </tr></thead><tbody>
        ${data.subscriptions.map(s => `<tr>
          <td class="mono" style="font-size:10px;">${s.customerId}</td>
          <td>${s.customerEmail || '-'}</td>
          <td>${s.plan || '-'}</td>
          <td>${s.amount.toFixed(2)}${s.currency}</td>
          <td class="small">${fmtDate(s.currentPeriodEnd)}</td>
          <td class="small">${fmtDate(s.created)}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
    <div class="section">
      <h2>💵 Paiements récents (30j)</h2>
      <table><thead><tr>
        <th>Date</th><th>Email</th><th>Montant</th><th>Description</th>
      </tr></thead><tbody>
        ${data.recentPayments.map(p => `<tr>
          <td class="small">${fmtDateTime(p.date)}</td>
          <td>${p.customerEmail || '-'}</td>
          <td>${p.amount.toFixed(2)}${p.currency}</td>
          <td>${p.description || '-'}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

if (TOKEN) loadTab('overview');
</script>
</body>
</html>
